name: Auto VPS Extend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python vps.py
        env:
          LABS_INSTANCE_NAME: ${{ secrets.LABS_INSTANCE_NAME }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          BASE_URL: https://gcp.2z2.top
